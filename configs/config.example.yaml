server:
  port: 18080
  mode: debug # debug | release

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "12345678"
  database: wvp
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  database: 7
  pool_size: 10

sip:
  port: 8116
  domain: "4101050000"
  id: "41010500002000000001"
  password: "12345678"
  alarm: false

# zero-media-kit 流媒体节点（HTTP API 与 Hook 回调）
media:
  id: zeromediakit-local
  type: zeromediakit
  ip: 127.0.0.1
  http_port: 8080
  secret: "035c73f7-bb6b-4889-a715-d9eb2d1925cc"
  rtp:
    enable: true
    port_range: "40000,45000"
    send_port_range: "50000,55000"

log:
  level: info          # debug | info | warn | error
  format: text         # text | json
  output: both         # stdout | file | both
  file:
    path: logs/zero-web-kit.log
    max_size_mb: 100   # 单文件上限（MB），超出自动切分
    max_backups: 10    # 保留历史文件个数
    max_age_days: 30   # 历史文件最长保留天数
    compress: true     # 归档 gzip 压缩

user_settings:
  play_timeout: 180000
  stream_on_demand: true
  server_id: "000000"
  login_timeout: 60 # minutes
  jwk_file: "config/jwk.json"

onvif:
  discovery_timeout: 5 # seconds
  probe_interval: 60   # seconds
