server:
  port: 18080
  mode: debug # debug | release

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "12345678"
  database: zws
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  database: 7
  pool_size: 10

# 国标 SIP 已迁至页面「系统管理 → 国标配置」，存库表 zws_gb_sip_config，此处不再配置。

# 媒体节点改为页面「媒体节点」动态添加并落库，启动时可为空。
# 如需兼容临时指定，可取消注释（IP+http_port 非空才生效）。
# media:
#   id: zero-media-server
#   type: zms
#   ip: 192.168.1.5
#   http_port: 8080
#   secret: ""

log:
  level: info          # debug | info | warn | error
  format: text         # text | json
  output: both         # stdout | file | both
  file:
    path: logs/zero-web-kit.log
    max_size_mb: 100   # 单文件上限（MB），超出自动切分为 zero-web-kit-*.log[.gz]
    max_backups: 20    # 最多保留多少个历史文件（与天数同时生效，先到先删）
    max_age_days: 7    # 历史文件最长保留天数，超时自动删除，避免撑满磁盘
    compress: true     # 切分后的历史文件 gzip 压缩

user_settings:
  play_timeout: 180000
  record_info_timeout: 30000
  stream_on_demand: true
  push_authority: false
  record_push_live: false
  server_id: "000000"
  login_timeout: 60 # minutes
  jwk_file: "config/jwk.json"

onvif:
  discovery_timeout: 5 # seconds
  probe_interval: 60   # seconds
