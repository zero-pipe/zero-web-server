<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Zero Media">
  <defs>
    <linearGradient id="bg" x1="18%" y1="8%" x2="88%" y2="96%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f3fc"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="42%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- tile with safe padding -->
  <rect x="6" y="6" width="116" height="116" rx="24" fill="url(#bg)" stroke="#90caf9" stroke-width="2"/>

  <!-- CV corners inset so they don't collide with tile stroke -->
  <g fill="none" stroke="#1e88e5" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M26 44 V30 H40"/>
    <path d="M102 44 V30 H88"/>
    <path d="M26 84 V98 H40"/>
    <path d="M102 84 V98 H88"/>
  </g>

  <!-- play: keep tip left of waves so arcs stay inside tile -->
  <path d="M36 36 L36 92 L82 64 Z" fill="url(#play)"/>

  <!-- circular iris -->
  <circle cx="54" cy="64" r="11.5" fill="#0d47a1"/>
  <circle cx="54" cy="64" r="11.5" fill="none" stroke="#81d4fa" stroke-width="1.4" opacity="0.55"/>
  <circle cx="54" cy="64" r="6.4" fill="none" stroke="#e3f2fd" stroke-width="2"/>
  <circle cx="54" cy="64" r="3" fill="#e3f2fd"/>
  <circle cx="54" cy="64" r="1.35" fill="#1565c0"/>

  <!-- waves fully inside rounded tile (max ~108) -->
  <g fill="none" stroke="url(#wave)" stroke-linecap="round">
    <path d="M88 52 A16 16 0 0 1 88 76" stroke-width="3.6"/>
    <path d="M96 44 A26 26 0 0 1 96 84" stroke-width="3.3" opacity="0.88"/>
    <path d="M104 36 A36 36 0 0 1 104 92" stroke-width="3" opacity="0.72"/>
  </g>
</svg>
