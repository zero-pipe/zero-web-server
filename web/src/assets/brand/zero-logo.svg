<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ZWS">
  <defs>
    <linearGradient id="tile" x1="12%" y1="0%" x2="88%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="55%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="lens" x1="30%" y1="20%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
  </defs>

  <!-- 平台主色圆角底，贴合侧栏蓝 -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#tile)"/>

  <!-- 机器视觉取景框 -->
  <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M28 46 V30 H44"/>
    <path d="M100 46 V30 H84"/>
    <path d="M28 82 V98 H44"/>
    <path d="M100 82 V98 H84"/>
  </g>

  <!-- 扫描线 -->
  <line x1="34" y1="64" x2="94" y2="64" stroke="#bbdefb" stroke-width="1.6" opacity="0.55"/>

  <!-- 视觉镜头 / 虹膜 -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="#e3f2fd" stroke-width="3.2" opacity="0.9"/>
  <circle cx="64" cy="64" r="15" fill="url(#lens)" opacity="0.35"/>
  <circle cx="64" cy="64" r="15" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <circle cx="64" cy="64" r="8.5" fill="#0d47a1"/>
  <circle cx="64" cy="64" r="8.5" fill="none" stroke="#bbdefb" stroke-width="1.4"/>
  <circle cx="64" cy="64" r="3.4" fill="#ffffff"/>

  <!-- AI 检测框（目标识别角标） -->
  <g fill="none" stroke="#b3e5fc" stroke-width="2.4" stroke-linecap="square" opacity="0.98">
    <path d="M76 40 h12 M76 40 v12"/>
    <path d="M100 40 h-12 M100 40 v12"/>
    <path d="M76 64 h12 M76 64 v-12"/>
    <path d="M100 64 h-12 M100 64 v-12"/>
  </g>
</svg>
