<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ZWS">
  <!-- Platform blues: #1565c0 / #0d47a1 / #90caf9 -->
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#tile)"/>

  <!-- Z formed by IoT links -->
  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 38 H94 L34 90 H94"/>
  </g>
  <g fill="none" stroke="#90caf9" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M34 38 H94 L34 90 H94"/>
  </g>

  <!-- Network nodes on Z -->
  <g>
    <circle cx="34" cy="38" r="7" fill="#e3f2fd" stroke="#ffffff" stroke-width="2"/>
    <circle cx="94" cy="38" r="7" fill="#42a5f5" stroke="#ffffff" stroke-width="2"/>
    <circle cx="64" cy="64" r="6.5" fill="#90caf9" stroke="#ffffff" stroke-width="2"/>
    <circle cx="34" cy="90" r="7" fill="#42a5f5" stroke="#ffffff" stroke-width="2"/>
    <circle cx="94" cy="90" r="7" fill="#e3f2fd" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Tiny link stubs suggesting mesh -->
  <g stroke="#bbdefb" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="34" y1="38" x2="28" y2="28"/>
    <line x1="94" y1="38" x2="100" y2="28"/>
    <line x1="34" y1="90" x2="28" y2="100"/>
    <line x1="94" y1="90" x2="100" y2="100"/>
  </g>
  <g fill="#bbdefb">
    <circle cx="28" cy="28" r="3"/>
    <circle cx="100" cy="28" r="3"/>
    <circle cx="28" cy="100" r="3"/>
    <circle cx="100" cy="100" r="3"/>
  </g>
</svg>
