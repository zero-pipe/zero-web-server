<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Web Kit — 双列侧栏设计稿</title>
  <style>
    :root {
      --blue: #1565c0;
      --blue-deep: #0d47a1;
      --blue-soft: #e8f1fb;
      --panel: #f5f8fc;
      --text: #4a5568;
      --line: #e3ebf5;
      --primary-w: 84px;
      --secondary-w: 176px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #dbe4ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .frame {
      width: min(1100px, 100%);
      height: 640px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 16px 40px rgba(13, 71, 161, 0.18);
    }
    .primary {
      width: var(--primary-w);
      background: linear-gradient(180deg, var(--blue), var(--blue-deep));
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .brand {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      font-weight: 700;
      font-size: 15px;
    }
    .brand-dot {
      width: 28px; height: 28px; border-radius: 6px; background: #fff;
      color: var(--blue); display: grid; place-items: center; font-size: 12px; font-weight: 800;
    }
    .p-item {
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,.78);
      cursor: pointer;
    }
    .p-item.active {
      background: rgba(255,255,255,.18);
      color: #fff;
      box-shadow: inset 3px 0 0 #90caf9;
    }
    .p-item .ico {
      width: 22px; height: 22px; border-radius: 4px; background: rgba(255,255,255,.2);
    }
    .secondary {
      width: var(--secondary-w);
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }
    .s-head {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: var(--blue);
      font-weight: 600;
      border-bottom: 1px solid var(--line);
    }
    .s-item {
      min-height: 46px;
      margin: 6px 12px;
      padding: 0 14px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--text);
      font-size: 13px;
    }
    .s-item.active {
      background: #e3f0ff;
      color: #0d47a1;
      font-weight: 600;
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .s-item .ico {
      width: 30px; height: 30px; border-radius: 8px;
      background: #e8eef5; display: grid; place-items: center;
      font-size: 11px; font-weight: 700; color: #607080;
    }
    .s-item.active .ico {
      background: var(--blue); color: #fff;
    }
    .main {
      flex: 1;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
    }
    .top {
      height: 50px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: #64748b;
      font-size: 13px;
    }
    .content {
      flex: 1;
      margin: 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed #c5d4e8;
      display: grid;
      place-items: center;
      color: #94a3b8;
      font-size: 14px;
    }
    .note {
      position: absolute;
      left: 24px;
      bottom: 16px;
      font-size: 12px;
      color: #64748b;
    }
    .wrap { position: relative; width: min(1100px, 100%); }
    h1 {
      font-size: 16px;
      color: var(--blue-deep);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>双列侧栏设计稿 · 蓝白主色 · 一级业务域 / 二级功能页</h1>
    <div class="frame">
      <aside class="primary">
        <div class="brand"><span class="brand-dot">Z</span><span>Zero</span></div>
        <div class="p-item"><div class="ico"></div>电子地图</div>
        <div class="p-item active"><div class="ico"></div>设备管理</div>
        <div class="p-item"><div class="ico"></div>组织管理</div>
        <div class="p-item"><div class="ico"></div>录像管理</div>
        <div class="p-item"><div class="ico"></div>运维管理</div>
        <div class="p-item"><div class="ico"></div>系统管理</div>
        <div class="p-item"><div class="ico"></div>用户管理</div>
      </aside>
      <aside class="secondary">
        <div class="s-head">设备管理</div>
        <div class="s-item"><span class="ico">监</span>分屏监控</div>
        <div class="s-item"><span class="ico">通</span>通道列表</div>
        <div class="s-item active"><span class="ico">G</span>国标设备</div>
        <div class="s-item"><span class="ico">部</span>部标设备</div>
        <div class="s-item"><span class="ico">O</span>ONVIF设备</div>
        <div class="s-item"><span class="ico">推</span>推流列表</div>
        <div class="s-item"><span class="ico">拉</span>拉流代理</div>
      </aside>
      <section class="main">
        <div class="top">控制台 / 设备管理 / 国标设备</div>
        <div class="content">右侧业务页面区域（二级栏可拖拽缩放）</div>
      </section>
    </div>
    <p class="note">对应实现：web/src/layout/components/Sidebar/index.vue · menu.js</p>
  </div>
</body>
</html>
