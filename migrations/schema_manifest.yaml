# zero-web-kit 数据库表清单（单一真相源）
# ZWS (Zero Web Server) 表清单；新环境请用 004_init_zws_mysql_native.sql

version: "0.7.0"
mysql_min: "8.0"

migrations:
  new_install:
    - 004_init_zws_mysql_native.sql
    - 002_add_onvif_tables.sql
  legacy_install:
    - 001_init_zws_mysql.sql
    - 002_add_onvif_tables.sql
    - 003_update_zws_mysql.sql
  existing_upgrade:
    - 003_update_zws_mysql.sql
    - 005_fix_mobile_position.sql
    - 006_drop_legacy_tables.sql

required:
  description: 后端 v0.7.0 已实现功能依赖，缺失会导致运行错误
  tables:
    - name: zws_user
      module: auth
    - name: zws_user_role
      module: auth
    - name: zws_device
      module: gb28181
    - name: zws_device_channel
      module: gb28181
    - name: zws_media_server
      module: media
    - name: zws_platform
      module: cascade
    - name: zws_platform_channel
      module: cascade
    - name: zws_stream_push
      module: stream
    - name: zws_stream_proxy
      module: stream
    - name: zws_cloud_record
      module: record
    - name: zws_record_plan
      module: record
    - name: zws_record_plan_item
      module: record
    - name: zws_alarm
      module: alarm
    - name: zws_mobile_position
      module: position
      notes: channel_id 必须为 INT，对应 zws_device_channel.id
    - name: zws_onvif_device
      module: onvif
      migration: 002_add_onvif_tables.sql
    - name: zws_onvif_channel
      module: onvif
      migration: 002_add_onvif_tables.sql

optional:
  description: 表已建但 API 未实现或仅占位，不影响当前核心功能
  tables:
    - name: zws_user_api_key
      module: auth
      status: api_pending
    - name: zws_common_group
      module: channel
      status: api_stub
    - name: zws_common_region
      module: channel
      status: api_stub
    - name: zws_platform_group
      module: cascade
      status: api_pending
    - name: zws_platform_region
      module: cascade
      status: api_pending
    - name: zws_jt_terminal
      module: jt1078
      status: api_pending
    - name: zws_jt_channel
      module: jt1078
      status: api_pending

deprecated:
  description: 历史遗留表，ZWS 不读写，可用 006 清理
  tables:
    - name: zws_device_alarm
      replaced_by: zws_alarm
    - name: zws_device_mobile_position
      replaced_by: zws_mobile_position
    - name: zws_gb_stream
    - name: zws_log
    - name: zws_platform_catalog
    - name: zws_platform_gb_channel
    - name: zws_platform_gb_stream
    - name: zws_resources_tree

column_fixes:
  - table: zws_mobile_position
    column: channel_id
    expect_type: int
    legacy_type: varchar
    fix_migration: 005_fix_mobile_position.sql
