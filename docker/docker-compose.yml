version: '3.8'

# 开发依赖：MySQL + Redis。流媒体请单独部署 zero-media-server（ZMS，默认 HTTP :8080）。
services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zws
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init_zws_mysql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../sql/add_onvif_tables.sql:/docker-entrypoint-initdb.d/02-onvif.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
