# zero-web-kit 数据库表清单
# 新环境请用 sql/init_zws_mysql.sql + sql/add_onvif_tables.sql

version: "0.7.0"
mysql_min: "8.0"

scripts:
  new_install:
    - init_zws_mysql.sql
    - add_onvif_tables.sql

required:
  description: 后端已实现功能依赖，缺失会导致运行错误
  tables:
    - name: zws_user
      module: auth
    - name: zws_user_role
      module: auth
    - name: zws_device
      module: gb28181
    - name: zws_device_channel
      module: gb28181
    - name: zws_media_server
      module: media
    - name: zws_gb_sip_config
      module: gb28181
    - name: zws_platform
      module: cascade
    - name: zws_platform_channel
      module: cascade
    - name: zws_stream_push
      module: stream
    - name: zws_stream_proxy
      module: stream
    - name: zws_cloud_record
      module: record
    - name: zws_record_plan
      module: record
    - name: zws_record_plan_item
      module: record
    - name: zws_alarm
      module: alarm
    - name: zws_mobile_position
      module: position
      notes: channel_id 为 INT，对应 zws_device_channel.id
    - name: zws_onvif_device
      module: onvif
      script: add_onvif_tables.sql
    - name: zws_onvif_channel
      module: onvif
      script: add_onvif_tables.sql

optional:
  description: 表已建但 API 未实现或仅占位
  tables:
    - name: zws_user_api_key
      module: auth
    - name: zws_common_group
      module: channel
    - name: zws_common_region
      module: channel
    - name: zws_platform_group
      module: cascade
    - name: zws_platform_region
      module: cascade
    - name: zws_jt_terminal
      module: jt1078
    - name: zws_jt_channel
      module: jt1078
